name: CI/CD — EnobFinance

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/enob-finance

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: enobfinance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DEBUG: 'True'
      SECRET_KEY: ci-only-insecure-key
      ALLOWED_HOSTS: localhost
      CSRF_TRUSTED_ORIGINS: http://localhost
      DB_NAME: enobfinance_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: '5432'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test --verbosity=2

  # ─── Build & Push ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:main-${{ github.run_number }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to vps-enob
    runs-on: vps-enob
    needs: build-push

    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Buscar segredos do Infisical
        uses: Infisical/secrets-action@v1.0.0
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain: "https://infisical.seudominio.com/api"
          project-slug: "enob-finance"
          env-slug: "prod"
          export-type: "file"
          file-output-path: ".env"

      - name: Ajustar variáveis específicas do deploy
        run: |
          {
            echo "DB_HOST=db"
            echo "DB_PORT=5432"
            echo "IMAGE=${{ env.IMAGE }}:main-${{ github.run_number }}"
          } >> .env

      - name: Pull new image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker compose pull web

      - name: Start services
        run: docker compose up -d --force-recreate

      - name: Verify deployment
        run: |
          echo "Aguardando inicialização..."
          sleep 15
          docker compose ps
          docker compose logs web --tail=30

      - name: Clean up old images
        run: docker image prune -f
