{% extends 'base.html' %}

{% block title %}Confirmar exclusão — EnobFinance{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="rounded-2xl bg-white dark:bg-[#0A1428] border border-gray-100 dark:border-white/8 shadow-sm p-6 transition-theme">

    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-red-50 dark:bg-red-500/10 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-red-500 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-[#000918] dark:text-white">Confirmar exclusão</h1>
        <p class="text-sm text-[#454D60] dark:text-white/40 mt-0.5">Esta ação não pode ser desfeita.</p>
      </div>
    </div>

    <div class="px-4 py-3 rounded-lg bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 mb-6">
      <p class="text-sm text-[#000918] dark:text-white/80">{{ item_label }}</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="flex items-center gap-3">
        <button type="submit"
                class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold
                       bg-red-50 text-red-600 dark:bg-red-500/10 dark:text-red-400
                       hover:bg-red-100 dark:hover:bg-red-500/20 transition-all">
          Excluir
        </button>
        <a href="{{ cancel_url }}"
           class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold
                  border border-gray-200 dark:border-white/10 text-[#454D60] dark:text-white/70
                  bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/8 transition-all">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
