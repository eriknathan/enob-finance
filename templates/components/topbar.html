<header class="h-[68px] bg-white/90 dark:bg-[#0A1428]/95 backdrop-blur-sm
              border-b border-gray-200 dark:border-white/8
              flex items-center px-4 md:px-6 justify-between sticky top-0 z-10 transition-theme">

  <!-- Left: mobile menu + breadcrumb -->
  <div class="flex items-center gap-3">
    <!-- Hamburger (mobile only) -->
    <button onclick="openMobileNav()"
            class="lg:hidden p-2 rounded-lg text-[#454D60] dark:text-white/50
                   hover:bg-gray-100 dark:hover:bg-white/5 transition-all"
            aria-label="Abrir menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Breadcrumb slot -->
    <div class="flex items-center gap-2 text-sm">
      {% block breadcrumb %}{% endblock %}
    </div>
  </div>

  <!-- Right: theme toggle + actions + logout -->
  <div class="flex items-center gap-2">

    <!-- Slot for page-specific actions -->
    {% block topbar_actions %}{% endblock %}

    <!-- Theme toggle -->
    <button onclick="toggleTheme()"
            class="p-2 rounded-lg text-[#454D60] dark:text-white/50
                   hover:bg-gray-100 dark:hover:bg-white/5 transition-all"
            aria-label="Alternar tema">
      <!-- Sun icon (visible in dark mode → click switches to light) -->
      <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <!-- Moon icon (visible in light mode → click switches to dark) -->
      <svg id="icon-moon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
      </svg>
    </button>

    <!-- Logout -->
    <a href="{% url 'logout' %}"
       class="hidden sm:inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium
              text-[#454D60] dark:text-white/50 hover:text-[#000918] dark:hover:text-white
              hover:bg-gray-100 dark:hover:bg-white/5 transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sair
    </a>
  </div>
</header>
