services:
  web:
    image: ${IMAGE:-ghcr.io/eriknathan/enob-finance:latest}
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: enobfinance.settings_prod
      DB_HOST: db
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn enobfinance.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: enobfinance_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-enobfinance}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-enobfinance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: enobfinance_nginx
    ports:
      - "8083:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
